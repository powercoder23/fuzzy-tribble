<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>fuzzy-tribble · dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  /* ── Tokens ────────────────────────────────────────────────── */
  :root {
    --bg:        #080810;
    --surface:   #0f0f1a;
    --surface2:  #161625;
    --border:    #1e1e35;
    --amber:     #f59e0b;
    --amber-dim: #92600a;
    --green:     #10b981;
    --red:       #ef4444;
    --blue:      #6366f1;
    --text:      #e2e8f0;
    --muted:     #4a5568;
    --mono:      'JetBrains Mono', monospace;
    --sans:      'Inter', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    min-height: 100vh;
  }

  /* ── Layout ────────────────────────────────────────────────── */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--amber);
    letter-spacing: 0.08em;
  }

  .logo span { color: var(--muted); }

  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--muted);
    display: inline-block;
    margin-right: 6px;
    transition: background 0.3s;
  }
  .status-dot.live { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .status-dot.stale { background: var(--amber); }

  .status-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
  }

  .main { max-width: 1100px; margin: 0 auto; padding: 20px 16px 60px; }

  /* ── Section ───────────────────────────────────────────────── */
  .section { margin-bottom: 28px; }

  .section-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 18px 20px;
  }

  /* ── Controls ──────────────────────────────────────────────── */
  .iv-controls {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 18px;
  }

  .stock-search {
    flex: 1;
    min-width: 180px;
    max-width: 280px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    padding: 8px 12px;
    outline: none;
    transition: border-color 0.2s;
  }
  .stock-search:focus { border-color: var(--amber); }

  .range-group { display: flex; gap: 4px; }

  .range-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    padding: 6px 10px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.05em;
  }
  .range-btn:hover { border-color: var(--amber-dim); color: var(--text); }
  .range-btn.active {
    background: var(--amber);
    border-color: var(--amber);
    color: #000;
  }

  .view-toggle {
    display: flex;
    gap: 4px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 3px;
  }
  .view-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 11px;
    font-family: var(--mono);
    padding: 5px 10px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .view-btn.active { background: var(--surface); color: var(--amber); }

  /* ── IV Stats row ──────────────────────────────────────────── */
  .iv-stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
    gap: 10px;
    margin-bottom: 18px;
  }

  .stat-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 14px;
  }

  .stat-label {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .stat-value {
    font-family: var(--mono);
    font-size: 20px;
    font-weight: 500;
    color: var(--text);
    line-height: 1;
  }

  .stat-value.cheap  { color: var(--green); }
  .stat-value.normal { color: var(--amber); }
  .stat-value.rich   { color: var(--red); }

  .stat-sub {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    margin-top: 3px;
  }

  /* ── IVR gauge ─────────────────────────────────────────────── */
  .ivr-bar-wrap {
    margin-top: 6px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .ivr-bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.4s ease;
    background: var(--muted);
  }
  .ivr-bar-fill.cheap  { background: var(--green); }
  .ivr-bar-fill.normal { background: var(--amber); }
  .ivr-bar-fill.rich   { background: var(--red); }

  /* ── Chart container ───────────────────────────────────────── */
  .chart-wrap {
    position: relative;
    height: 280px;
    margin-bottom: 4px;
  }

  @media (max-width: 600px) {
    .chart-wrap { height: 220px; }
  }

  .chart-empty {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--muted);
    font-size: 13px;
    font-family: var(--mono);
  }

  /* ── Symbol table ──────────────────────────────────────────── */
  .symbol-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
    gap: 8px;
    max-height: 320px;
    overflow-y: auto;
    padding-right: 4px;
  }

  .sym-chip {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    cursor: pointer;
    transition: border-color 0.15s;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .sym-chip:hover { border-color: var(--amber-dim); }
  .sym-chip.selected { border-color: var(--amber); }

  .sym-name {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 500;
    color: var(--text);
  }

  .sym-ivr {
    font-family: var(--mono);
    font-size: 11px;
    padding: 2px 6px;
    border-radius: 4px;
    font-weight: 500;
  }
  .sym-ivr.cheap  { background: rgba(16,185,129,0.15); color: var(--green); }
  .sym-ivr.normal { background: rgba(245,158,11,0.15); color: var(--amber); }
  .sym-ivr.rich   { background: rgba(239,68,68,0.15);  color: var(--red); }
  .sym-ivr.na     { background: var(--surface); color: var(--muted); }

  /* ── Paper trades table ─────────────────────────────────────── */
  .trades-table { width: 100%; border-collapse: collapse; }
  .trades-table th {
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 600;
    text-align: left;
    padding: 0 8px 10px;
    border-bottom: 1px solid var(--border);
  }
  .trades-table td {
    padding: 10px 8px;
    border-bottom: 1px solid var(--border);
    font-family: var(--mono);
    font-size: 12px;
    vertical-align: middle;
  }
  .trades-table tr:last-child td { border-bottom: none; }

  .tag {
    display: inline-block;
    padding: 2px 7px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.05em;
  }
  .tag.ce  { background: rgba(99,102,241,0.2); color: #818cf8; }
  .tag.pe  { background: rgba(239,68,68,0.15); color: var(--red); }
  .tag.win { background: rgba(16,185,129,0.15); color: var(--green); }
  .tag.loss { background: rgba(239,68,68,0.15); color: var(--red); }
  .tag.open { background: rgba(245,158,11,0.15); color: var(--amber); }

  .pnl-pos { color: var(--green); }
  .pnl-neg { color: var(--red); }

  /* ── Scrollbar ─────────────────────────────────────────────── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--surface); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ── Loading ───────────────────────────────────────────────── */
  .loading {
    color: var(--muted);
    font-family: var(--mono);
    font-size: 12px;
    padding: 20px 0;
    text-align: center;
  }

  .error-msg {
    color: var(--red);
    font-family: var(--mono);
    font-size: 12px;
    padding: 12px;
    background: rgba(239,68,68,0.08);
    border: 1px solid rgba(239,68,68,0.2);
    border-radius: 6px;
  }

  /* ── Nav tabs ──────────────────────────────────────────────── */
  .nav-tabs {
    display: flex;
    gap: 2px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 20px;
  }
  .nav-tab {
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--muted);
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 500;
    padding: 10px 16px;
    cursor: pointer;
    transition: all 0.15s;
    margin-bottom: -1px;
  }
  .nav-tab:hover { color: var(--text); }
  .nav-tab.active { color: var(--amber); border-bottom-color: var(--amber); }
</style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
  <div class="logo">fuzzy<span>-</span>tribble <span>/ dashboard</span></div>
  <div style="display:flex;align-items:center;gap:12px">
    <span id="last-update" class="status-label">—</span>
    <span class="status-dot" id="status-dot"></span>
  </div>
</div>

<div class="main">

  <!-- Nav -->
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showTab('iv')">IV Graph</button>
    <button class="nav-tab" onclick="showTab('trades')">Paper Trades</button>
    <button class="nav-tab" onclick="showTab('universe')">Universe</button>
  </div>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- TAB: IV GRAPH                                              -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <div id="tab-iv">

    <div class="section">
      <div class="section-label">IV Graph</div>
      <div class="card">
        <!-- Controls -->
        <div class="iv-controls">
          <input type="text" id="stock-input" class="stock-search"
                 placeholder="Symbol — e.g. NIFTY" autocomplete="off"
                 oninput="onSymbolInput(this.value)">
          <div class="range-group" id="range-group">
            <button class="range-btn" onclick="setRange(7)">7D</button>
            <button class="range-btn active" onclick="setRange(30)">30D</button>
            <button class="range-btn" onclick="setRange(90)">90D</button>
            <button class="range-btn" onclick="setRange(252)">1Y</button>
          </div>
          <div class="view-toggle">
            <button class="view-btn active" id="vbtn-daily" onclick="setView('daily')">Daily</button>
            <button class="view-btn" id="vbtn-intraday" onclick="setView('intraday')">Today</button>
          </div>
        </div>

        <!-- Autocomplete dropdown -->
        <div id="sym-dropdown" style="position:relative;margin-bottom:12px;display:none">
          <div id="sym-list" style="
            background:var(--surface2);border:1px solid var(--border);
            border-radius:6px;max-height:200px;overflow-y:auto;position:absolute;
            top:0;left:0;width:280px;z-index:50;"></div>
        </div>

        <!-- IV Stats -->
        <div class="iv-stats" id="iv-stats">
          <div class="stat-card">
            <div class="stat-label">Current IV</div>
            <div class="stat-value" id="stat-iv">—</div>
            <div class="stat-sub" id="stat-iv-sub">ATM IV %</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">IV Rank</div>
            <div class="stat-value" id="stat-ivr">—</div>
            <div class="ivr-bar-wrap"><div class="ivr-bar-fill" id="ivr-bar" style="width:0%"></div></div>
          </div>
          <div class="stat-card">
            <div class="stat-label">52W Range</div>
            <div class="stat-value" id="stat-range" style="font-size:14px;padding-top:4px">—</div>
            <div class="stat-sub" id="stat-samples">— samples</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">PCR</div>
            <div class="stat-value" id="stat-pcr">—</div>
            <div class="stat-sub">Put / Call OI</div>
          </div>
        </div>

        <!-- Chart -->
        <div class="chart-wrap">
          <div class="chart-empty" id="chart-empty">Select a symbol to view IV history</div>
          <canvas id="iv-chart" style="display:none"></canvas>
        </div>
        <div style="font-size:10px;color:var(--muted);text-align:right;margin-top:6px;font-family:var(--mono)" id="chart-meta"></div>
      </div>
    </div>

  </div><!-- /tab-iv -->


  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- TAB: PAPER TRADES                                          -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <div id="tab-trades" style="display:none">

    <div class="section">
      <div class="section-label">Today's Trades</div>
      <div class="card" id="trades-today-card">
        <div class="loading">Loading trades…</div>
      </div>
    </div>

    <div class="section">
      <div class="section-label">30-Day P&L</div>
      <div class="card">
        <div class="iv-stats" id="pnl-stats" style="margin-bottom:14px">
          <div class="stat-card">
            <div class="stat-label">Total Trades</div>
            <div class="stat-value" id="s-total">—</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Win Rate</div>
            <div class="stat-value" id="s-wr">—</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Net P&L</div>
            <div class="stat-value" id="s-pnl">—</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Expectancy</div>
            <div class="stat-value" id="s-exp">—</div>
            <div class="stat-sub">₹ per trade</div>
          </div>
        </div>
        <div class="chart-wrap" style="height:200px">
          <canvas id="pnl-chart"></canvas>
        </div>
      </div>
    </div>

  </div><!-- /tab-trades -->


  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- TAB: UNIVERSE                                              -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <div id="tab-universe" style="display:none">
    <div class="section">
      <div class="section-label">IV Universe — <span id="uni-count">—</span> stocks</div>
      <div class="card">
        <div style="margin-bottom:12px">
          <input type="text" class="stock-search" id="uni-filter"
                 placeholder="Filter symbols…" oninput="filterUniverse(this.value)"
                 style="max-width:100%;width:100%">
        </div>
        <div class="symbol-grid" id="universe-grid">
          <div class="loading">Loading universe…</div>
        </div>
      </div>
    </div>
  </div><!-- /tab-universe -->

</div><!-- /main -->


<script>
// ── State ──────────────────────────────────────────────────────────────────
let currentSymbol = null;
let currentRange  = 30;
let currentView   = 'daily';
let ivChart       = null;
let pnlChart      = null;
let allSymbols    = [];

// ── Helpers ────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);

async function api(path) {
  const r = await fetch(path);
  if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
  return r.json();
}

function ivrClass(rank) {
  if (rank === null || rank === undefined) return 'na';
  if (rank <= 30) return 'cheap';
  if (rank <= 60) return 'normal';
  return 'rich';
}

function fmtPnl(v) {
  if (v === null || v === undefined) return '—';
  const sign = v >= 0 ? '+' : '';
  return `${sign}₹${Math.round(v).toLocaleString('en-IN')}`;
}

// ── Tab switching ──────────────────────────────────────────────────────────
function showTab(name) {
  ['iv','trades','universe'].forEach(t => {
    $(`tab-${t}`).style.display = t === name ? '' : 'none';
  });
  document.querySelectorAll('.nav-tab').forEach((btn, i) => {
    btn.classList.toggle('active', ['iv','trades','universe'][i] === name);
  });
  if (name === 'trades'   && !pnlChart) loadTrades();
  if (name === 'universe' && allSymbols.length === 0) loadUniverse();
}

// ── Health / status bar ────────────────────────────────────────────────────
async function checkHealth() {
  try {
    const h = await api('/api/health');
    const dot = $('status-dot');
    const lastUpdate = $('last-update');
    if (h.last_iv_update) {
      const age = (Date.now() - new Date(h.last_iv_update).getTime()) / 60000;
      dot.className = 'status-dot ' + (age < 10 ? 'live' : 'stale');
      lastUpdate.textContent = `last IV ${Math.round(age)}m ago`;
    } else {
      dot.className = 'status-dot';
      lastUpdate.textContent = 'no IV data yet';
    }
  } catch(e) {
    $('status-dot').className = 'status-dot';
    $('last-update').textContent = 'offline';
  }
}

// ── Symbol autocomplete ────────────────────────────────────────────────────
let _symTimer = null;

function onSymbolInput(val) {
  clearTimeout(_symTimer);
  val = val.trim().toUpperCase();
  if (!val) { $('sym-dropdown').style.display = 'none'; return; }
  const matches = allSymbols.filter(s => s.symbol.startsWith(val)).slice(0, 10);
  if (!matches.length) { $('sym-dropdown').style.display = 'none'; return; }

  $('sym-list').innerHTML = matches.map(s => `
    <div onclick="selectSymbol('${s.symbol}')" style="
      padding:9px 12px;cursor:pointer;display:flex;justify-content:space-between;
      font-family:var(--mono);font-size:12px;border-bottom:1px solid var(--border)
    " onmouseover="this.style.background='var(--surface)'"
       onmouseout="this.style.background=''">
      <span>${s.symbol}</span>
      <span class="sym-ivr ${ivrClass(s.iv_rank)}">
        ${s.iv_rank !== null ? `IVR ${s.iv_rank}` : 'N/A'}
      </span>
    </div>
  `).join('');
  $('sym-dropdown').style.display = '';
}

function selectSymbol(sym) {
  $('stock-input').value = sym;
  $('sym-dropdown').style.display = 'none';
  loadIVChart(sym);
}

// ── Range + view ───────────────────────────────────────────────────────────
function setRange(days) {
  currentRange = days;
  document.querySelectorAll('.range-btn').forEach(b => {
    b.classList.toggle('active', b.textContent === days + 'D' ||
                                  (days === 252 && b.textContent === '1Y'));
  });
  if (currentSymbol) loadIVChart(currentSymbol);
}

function setView(v) {
  currentView = v;
  $('vbtn-daily').classList.toggle('active', v === 'daily');
  $('vbtn-intraday').classList.toggle('active', v === 'intraday');
  const rangeGroup = $('range-group');
  rangeGroup.style.opacity = v === 'intraday' ? '0.3' : '1';
  rangeGroup.style.pointerEvents = v === 'intraday' ? 'none' : '';
  if (currentSymbol) loadIVChart(currentSymbol);
}

// ── IV Chart ───────────────────────────────────────────────────────────────
async function loadIVChart(symbol) {
  currentSymbol = symbol;
  $('chart-empty').style.display = 'none';
  $('iv-chart').style.display = '';

  try {
    let data;
    if (currentView === 'intraday') {
      data = await api(`/api/iv/${symbol}/intraday`);
    } else {
      data = await api(`/api/iv/${symbol}?days=${currentRange}`);
    }

    // Update stats
    const iv = data.current_iv ?? (data.atm_iv ? data.atm_iv[data.atm_iv.length - 1] : null);
    const rank = data.iv_rank;
    const cls  = ivrClass(rank);

    $('stat-iv').textContent   = iv ? iv.toFixed(1) + '%' : '—';
    $('stat-iv').className     = 'stat-value';
    $('stat-ivr').textContent  = rank !== undefined && rank !== null ? rank.toFixed(1) : '—';
    $('stat-ivr').className    = `stat-value ${cls}`;
    $('ivr-bar').style.width   = `${Math.min(rank ?? 0, 100)}%`;
    $('ivr-bar').className     = `ivr-bar-fill ${cls}`;

    if (data.iv_min_52w && data.iv_max_52w) {
      $('stat-range').textContent  = `${data.iv_min_52w.toFixed(1)} – ${data.iv_max_52w.toFixed(1)}`;
      $('stat-samples').textContent = `${data.n_samples || '?'} samples`;
    }

    // PCR — latest value
    const pcrArr = data.pcr || [];
    const lastPcr = pcrArr.filter(x => x !== null).slice(-1)[0];
    $('stat-pcr').textContent = lastPcr ? lastPcr.toFixed(2) : '—';
    $('stat-pcr').className   = 'stat-value ' +
      (lastPcr > 1.2 ? 'cheap' : lastPcr < 0.6 ? 'rich' : '');

    $('chart-meta').textContent = `${symbol} · ${data.timestamps?.length ?? 0} data points`;

    renderIVChart(data);

  } catch(e) {
    $('chart-empty').textContent = e.message.includes('404')
      ? `No IV data for ${symbol}`
      : `Error: ${e.message}`;
    $('chart-empty').style.display = 'flex';
    $('iv-chart').style.display    = 'none';
  }
}

function renderIVChart(data) {
  if (ivChart) ivChart.destroy();

  const ctx  = $('iv-chart').getContext('2d');
  const labels = data.timestamps;
  const ivData  = data.atm_iv;
  const spotData = data.spot;
  const pcrData  = data.pcr;

  ivChart = new Chart(ctx, {
    data: {
      labels,
      datasets: [
        {
          type: 'line',
          label: 'ATM IV %',
          data: ivData,
          borderColor: '#f59e0b',
          backgroundColor: 'rgba(245,158,11,0.07)',
          borderWidth: 1.8,
          pointRadius: 0,
          pointHoverRadius: 4,
          fill: true,
          tension: 0.3,
          yAxisID: 'y',
        },
        {
          type: 'line',
          label: 'Spot ₹',
          data: spotData,
          borderColor: '#6366f1',
          borderWidth: 1.2,
          pointRadius: 0,
          pointHoverRadius: 3,
          fill: false,
          tension: 0.2,
          borderDash: [4, 3],
          yAxisID: 'y2',
        },
        {
          type: 'line',
          label: 'PCR',
          data: pcrData,
          borderColor: '#10b981',
          borderWidth: 1.2,
          pointRadius: 0,
          pointHoverRadius: 3,
          fill: false,
          tension: 0.3,
          borderDash: [2, 4],
          yAxisID: 'y3',
        },
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: {
          labels: {
            color: '#4a5568',
            font: { family: 'JetBrains Mono', size: 10 },
            boxWidth: 20,
            padding: 12,
          }
        },
        tooltip: {
          backgroundColor: '#0f0f1a',
          borderColor: '#1e1e35',
          borderWidth: 1,
          titleColor: '#94a3b8',
          bodyColor: '#e2e8f0',
          titleFont: { family: 'JetBrains Mono', size: 10 },
          bodyFont:  { family: 'JetBrains Mono', size: 11 },
          padding: 10,
        }
      },
      scales: {
        x: {
          ticks: {
            color: '#4a5568',
            font: { family: 'JetBrains Mono', size: 9 },
            maxTicksLimit: 8,
            maxRotation: 0,
          },
          grid: { color: '#1e1e35' },
        },
        y: {
          position: 'left',
          ticks: {
            color: '#f59e0b',
            font: { family: 'JetBrains Mono', size: 9 },
            callback: v => v.toFixed(1) + '%',
          },
          grid: { color: '#1a1a2e' },
        },
        y2: {
          position: 'right',
          display: (spotData || []).some(x => x > 0),
          ticks: {
            color: '#6366f1',
            font: { family: 'JetBrains Mono', size: 9 },
            callback: v => '₹' + v.toLocaleString('en-IN'),
          },
          grid: { display: false },
        },
        y3: {
          position: 'right',
          display: false,  // PCR on tooltip only — avoids 3-axis clutter
          grid: { display: false },
        },
      }
    }
  });
}

// ── Paper Trades ───────────────────────────────────────────────────────────
async function loadTrades() {
  try {
    const today = await api('/api/paper-trades');
    renderTodayTrades(today.trades);

    const hist  = await api('/api/paper-trades/history?days=30');
    renderPnlStats(hist.summary);
    renderPnlChart(hist.daily);
  } catch(e) {
    $('trades-today-card').innerHTML =
      `<div class="error-msg">Could not load trades: ${e.message}</div>`;
  }
}

function renderTodayTrades(trades) {
  if (!trades || !trades.length) {
    $('trades-today-card').innerHTML =
      '<div style="color:var(--muted);font-family:var(--mono);font-size:12px;padding:8px 0">No trades today</div>';
    return;
  }
  const rows = trades.map(t => {
    const side = (t.side || '').toUpperCase();
    const pnl  = t.realized_rupees;
    const pct  = t.realized_pct;
    const status = t.status === 'open' ? 'open' : pnl >= 0 ? 'win' : 'loss';
    const pnlCell = pnl !== null
      ? `<span class="${pnl >= 0 ? 'pnl-pos' : 'pnl-neg'}">${fmtPnl(pnl)} (${pct > 0 ? '+' : ''}${(pct||0).toFixed(1)}%)</span>`
      : '—';
    return `<tr>
      <td style="color:var(--text);font-weight:500">${t.symbol}</td>
      <td><span class="tag ${side.toLowerCase()}">${side}</span></td>
      <td>${t.strike || '—'}</td>
      <td>₹${(t.entry||0).toFixed(2)}</td>
      <td>₹${(t.last_price||0).toFixed(2)}</td>
      <td>${pnlCell}</td>
      <td><span class="tag ${status}">${status.toUpperCase()}</span></td>
    </tr>`;
  }).join('');

  $('trades-today-card').innerHTML = `
    <table class="trades-table">
      <thead><tr>
        <th>Symbol</th><th>Side</th><th>Strike</th>
        <th>Entry</th><th>LTP</th><th>P&L</th><th>Status</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function renderPnlStats(s) {
  if (!s) return;
  $('s-total').textContent = s.total_trades;
  $('s-wr').textContent    = s.win_rate + '%';
  $('s-wr').className      = 'stat-value ' + (s.win_rate >= 50 ? 'cheap' : s.win_rate >= 35 ? 'normal' : 'rich');
  $('s-pnl').textContent   = fmtPnl(s.net_rupees);
  $('s-pnl').className     = 'stat-value ' + (s.net_rupees >= 0 ? 'cheap' : 'rich');
  $('s-exp').textContent   = fmtPnl(s.expectancy);
  $('s-exp').className     = 'stat-value ' + (s.expectancy >= 0 ? 'cheap' : 'rich');
}

function renderPnlChart(daily) {
  if (pnlChart) pnlChart.destroy();
  if (!daily || !daily.length) return;
  const ctx = $('pnl-chart').getContext('2d');
  pnlChart = new Chart(ctx, {
    data: {
      labels: daily.map(d => d.date.slice(5)),  // MM-DD
      datasets: [
        {
          type: 'bar',
          label: 'Daily P&L',
          data: daily.map(d => d.net_rupees),
          backgroundColor: daily.map(d => (d.net_rupees||0) >= 0
            ? 'rgba(16,185,129,0.5)' : 'rgba(239,68,68,0.5)'),
          borderRadius: 3,
          yAxisID: 'y',
        },
        {
          type: 'line',
          label: 'Cumulative',
          data: daily.map(d => d.cumulative),
          borderColor: '#f59e0b',
          borderWidth: 1.5,
          pointRadius: 0,
          fill: false,
          tension: 0.3,
          yAxisID: 'y',
        },
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { labels: { color: '#4a5568', font: { family: 'JetBrains Mono', size: 10 }, boxWidth: 16 } },
        tooltip: { backgroundColor: '#0f0f1a', borderColor: '#1e1e35', borderWidth: 1,
          titleColor: '#94a3b8', bodyColor: '#e2e8f0',
          bodyFont: { family: 'JetBrains Mono', size: 11 }, padding: 8 } },
      scales: {
        x: { ticks: { color: '#4a5568', font: { family: 'JetBrains Mono', size: 9 }, maxTicksLimit: 10 }, grid: { color: '#1e1e35' } },
        y: { ticks: { color: '#64748b', font: { family: 'JetBrains Mono', size: 9 }, callback: v => '₹' + v.toLocaleString('en-IN') }, grid: { color: '#1a1a2e' } },
      }
    }
  });
}

// ── Universe ───────────────────────────────────────────────────────────────
let allUniverse = [];

async function loadUniverse() {
  try {
    allUniverse = await api('/api/symbols');
    $('uni-count').textContent = allUniverse.length;
    renderUniverse(allUniverse);
  } catch(e) {
    $('universe-grid').innerHTML = `<div class="error-msg">${e.message}</div>`;
  }
}

function renderUniverse(syms) {
  if (!syms.length) {
    $('universe-grid').innerHTML = '<div class="loading">No symbols yet</div>';
    return;
  }
  $('universe-grid').innerHTML = syms.map(s => `
    <div class="sym-chip ${s.symbol === currentSymbol ? 'selected' : ''}"
         onclick="showTab('iv');selectSymbol('${s.symbol}')">
      <span class="sym-name">${s.symbol}</span>
      <span class="sym-ivr ${ivrClass(s.iv_rank)}">
        ${s.iv_rank !== null && s.iv_rank !== undefined ? s.iv_rank.toFixed(0) : 'N/A'}
      </span>
    </div>
  `).join('');
}

function filterUniverse(val) {
  val = val.trim().toUpperCase();
  renderUniverse(val ? allUniverse.filter(s => s.symbol.includes(val)) : allUniverse);
}

// ── Boot ───────────────────────────────────────────────────────────────────
async function boot() {
  checkHealth();
  setInterval(checkHealth, 60000);

  // Pre-load symbols for autocomplete
  try {
    allSymbols = await api('/api/symbols');
  } catch(e) {}
}

// Close autocomplete on outside click
document.addEventListener('click', e => {
  if (!e.target.closest('#stock-input') && !e.target.closest('#sym-dropdown')) {
    $('sym-dropdown').style.display = 'none';
  }
});

boot();
</script>
