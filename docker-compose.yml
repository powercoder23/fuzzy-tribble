volumes:
  shared-data:   # iv_history.db, scrip master, tokens — shared across all services

services:

  # ── Service 1: IV Collector ────────────────────────────────────────────────
  # Owns ALL option chain API calls.
  # Saves IV snapshots to shared-data volume.
  # No trading logic, no order placement.
  iv-collector:
    build:
      context: .
      dockerfile: Dockerfile.iv-collector
    container_name: iv-collector
    restart: unless-stopped
    env_file: .env
    environment:
      TZ: Asia/Kolkata
      APP_TIMEZONE: Asia/Kolkata
    volumes:
      - shared-data:/app/data
      - ./logs:/app/logs
    command: python iv_collector_service.py

  # ── Service 2: Momentum Strategy ──────────────────────────────────────────
  # Reads IV from shared-data (written by iv-collector).
  # Calls Dhan API only for: regime detection (daily candles) and
  # option chain at signal execution time.
  momentum:
    build:
      context: .
      dockerfile: Dockerfile.momentum
    container_name: momentum-strategy
    restart: unless-stopped
    env_file: .env
    environment:
      TZ: Asia/Kolkata
      APP_TIMEZONE: Asia/Kolkata
    volumes:
      - shared-data:/app/data
      - ./logs:/app/logs
    depends_on:
      - iv-collector
    command: python momentum_runner.py

  # ── Service 3: Discount/Premium Strategy ──────────────────────────────────
  # Reads IV history from the shared-data volume (written by iv-collector).
  # Runs the discount scanner only — it does NOT collect IV itself.
  discount:
    build:
      context: .
      dockerfile: Dockerfile.discount
    container_name: discount-strategy
    restart: unless-stopped
    env_file: .env
    environment:
      TZ: Asia/Kolkata
      APP_TIMEZONE: Asia/Kolkata
    volumes:
      - shared-data:/app/data
      - ./logs:/app/logs
    depends_on:
      - iv-collector
    command: python main.py

  # ── Service 4: Break and Bounce Strategy ──────────────────────────────────
  # Step 1: Mark yesterday's daily candle high/low as key levels.
  # Step 2: Wait for 15-min close above/below the level (9:15–11:45 window).
  # Step 3: After breakout, enter on Hammer/Engulfing at the retest on 5-min.
  # Reads IV from shared-data for affordability filter.
  # Calls Dhan API for daily/intraday candles and option chain at signal time.
  break-bounce:
    build:
      context: .
      dockerfile: Dockerfile.break-bounce
    container_name: break-bounce-strategy
    restart: unless-stopped
    env_file: .env
    environment:
      TZ: Asia/Kolkata
      APP_TIMEZONE: Asia/Kolkata
    volumes:
      - shared-data:/app/data
      - ./logs:/app/logs
    depends_on:
      - iv-collector
    command: python break_bounce_runner.py

  # ── Service 5: Directional IV Strategy ──────────────────────────────────
  # Uses shared IV history and option chain data to identify directional
  # option buying opportunities with IV edge and trend alignment.
  directional-iv:
    build:
      context: .
      dockerfile: Dockerfile.directional
    container_name: directional-iv-strategy
    restart: unless-stopped
    env_file: .env
    environment:
      TZ: Asia/Kolkata
      APP_TIMEZONE: Asia/Kolkata
    volumes:
      - shared-data:/app/data
      - ./logs:/app/logs
    depends_on:
      - iv-collector
    command: python directional_iv_runner.py
