volumes:
  shared-data:   # iv_history.db, scrip master, tokens — shared across all services

services:

  # ── Service 1: IV Collector ────────────────────────────────────────────────
  iv-collector:
    build:
      context: .
      dockerfile: Dockerfile.iv-collector
    container_name: iv-collector
    shm_size: 512m
    restart: unless-stopped
    env_file: .env
    environment:
      TZ: Asia/Kolkata
      APP_TIMEZONE: Asia/Kolkata
    volumes:
      - shared-data:/app/data
      - ./logs:/app/logs
    command: python iv_collector_service.py

  # ── Service 2: Momentum Strategy ──────────────────────────────────────────
  momentum:
    build:
      context: .
      dockerfile: Dockerfile.momentum
    container_name: momentum-strategy
    shm_size: 512m
    restart: unless-stopped
    env_file: .env
    environment:
      TZ: Asia/Kolkata
      APP_TIMEZONE: Asia/Kolkata
    volumes:
      - shared-data:/app/data
      - ./logs:/app/logs
    depends_on:
      - iv-collector
    command: python momentum_runner.py

  # ── Service 3: Discount/Premium Strategy ──────────────────────────────────
  discount:
    build:
      context: .
      dockerfile: Dockerfile.discount
    container_name: discount-strategy
    shm_size: 512m
    restart: unless-stopped
    env_file: .env
    environment:
      TZ: Asia/Kolkata
      APP_TIMEZONE: Asia/Kolkata
    volumes:
      - shared-data:/app/data
      - ./logs:/app/logs
    depends_on:
      - iv-collector
    command: python main.py

  # ── Service 4: Break and Bounce Strategy ──────────────────────────────────
  break-bounce:
    build:
      context: .
      dockerfile: Dockerfile.break-bounce
    container_name: break-bounce-strategy
    shm_size: 512m
    restart: unless-stopped
    env_file: .env
    environment:
      TZ: Asia/Kolkata
      APP_TIMEZONE: Asia/Kolkata
    volumes:
      - shared-data:/app/data
      - ./logs:/app/logs
    depends_on:
      - iv-collector
    command: python break_bounce_runner.py

  # ── Service 5: Directional IV Strategy ──────────────────────────────────
  directional-iv:
    build:
      context: .
      dockerfile: Dockerfile.directional
    container_name: directional-iv-strategy
    shm_size: 512m
    restart: unless-stopped
    env_file: .env
    environment:
      TZ: Asia/Kolkata
      APP_TIMEZONE: Asia/Kolkata
    volumes:
      - shared-data:/app/data
      - ./logs:/app/logs
    depends_on:
      - iv-collector
    command: python directional_iv_runner.py
