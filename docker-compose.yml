volumes:
  shared-data:   # iv_history.db, scrip master, tokens — shared across all services

services:

  # ── Service 1: IV Collector ────────────────────────────────────────────────
  iv-collector:
    build:
      context: .
      dockerfile: Dockerfile.iv-collector
    container_name: iv-collector
    shm_size: 512m
    restart: unless-stopped
    env_file: .env
    environment:
      TZ: Asia/Kolkata
      APP_TIMEZONE: Asia/Kolkata
    volumes:
      - shared-data:/app/data
      - ./logs:/app/logs
    command: python -m collectors.iv_collector_service

  # ── Service 2: Momentum Strategy (DISCONTINUED) ──────────────────────────
  # Excluded from default `docker-compose up` via profile.
  # To run manually: docker-compose --profile momentum up momentum
  momentum:
    profiles: [momentum]
    build:
      context: .
      dockerfile: Dockerfile.momentum
    container_name: momentum-strategy
    shm_size: 512m
    restart: unless-stopped
    env_file: .env
    environment:
      TZ: Asia/Kolkata
      APP_TIMEZONE: Asia/Kolkata
    volumes:
      - shared-data:/app/data
      - ./logs:/app/logs
    depends_on:
      - iv-collector
    command: python momentum_runner.py

  # ── Service 3: Discount/Premium Strategy ──────────────────────────────────
  discount:
    build:
      context: .
      dockerfile: Dockerfile.discount
    container_name: discount-strategy
    shm_size: 512m
    restart: unless-stopped
    env_file: .env
    environment:
      TZ: Asia/Kolkata
      APP_TIMEZONE: Asia/Kolkata
    volumes:
      - shared-data:/app/data
      - ./logs:/app/logs
    depends_on:
      - iv-collector
    command: python main.py

  # ── Service 4: Break and Bounce Strategy ──────────────────────────────────
  break-bounce:
    build:
      context: .
      dockerfile: Dockerfile.break-bounce
    container_name: break-bounce-strategy
    shm_size: 512m
    restart: unless-stopped
    env_file: .env
    environment:
      TZ: Asia/Kolkata
      APP_TIMEZONE: Asia/Kolkata
    volumes:
      - shared-data:/app/data
      - ./logs:/app/logs
    depends_on:
      - iv-collector
    command: python break_bounce_runner.py

  # ── Service 5: Directional IV Strategy (DISCONTINUED) ───────────────────
  # Excluded from default `docker-compose up` via profile.
  # To run manually: docker-compose --profile directional-iv up directional-iv
  directional-iv:
    profiles: [directional-iv]
    build:
      context: .
      dockerfile: Dockerfile.directional
    container_name: directional-iv-strategy
    shm_size: 512m
    restart: unless-stopped
    env_file: .env
    environment:
      TZ: Asia/Kolkata
      APP_TIMEZONE: Asia/Kolkata
    volumes:
      - shared-data:/app/data
      - ./logs:/app/logs
    depends_on:
      - iv-collector
    command: python directional_iv_runner.py

  # IV Rank / IV Percentile scanner — alert-only screener for option buyers.
  # Reads iv_history.db only (no broker calls). Finds cheap-IV "buy zone" names.
  # To run manually: docker-compose --profile iv-rank up iv-rank
  iv-rank:
    build:
      context: .
      dockerfile: Dockerfile.iv-rank
    container_name: iv-rank-scanner
    restart: unless-stopped
    env_file: .env
    environment:
      TZ: Asia/Kolkata
      APP_TIMEZONE: Asia/Kolkata
    volumes:
      - shared-data:/app/data
      - ./logs:/app/logs
    depends_on:
      - iv-collector
    command: python iv_rank_runner.py

  # OI Buildup scanner — Long/Short Buildup, Covering, Unwinding across the F&O
  # universe (aggregate option OI from iv_history.db). Zero broker calls.
  # To run manually: docker-compose --profile oi-buildup up oi-buildup
  oi-buildup:
    build:
      context: .
      dockerfile: Dockerfile.scanner
    container_name: oi-buildup-scanner
    restart: unless-stopped
    env_file: .env
    environment:
      TZ: Asia/Kolkata
      APP_TIMEZONE: Asia/Kolkata
    volumes:
      - shared-data:/app/data
      - ./logs:/app/logs
    depends_on:
      - iv-collector
    command: python oi_buildup_runner.py

  # Extreme Opening scanner — gap% vs prev close AND open beyond prior high/low.
  # Reads iv_history.db only (true OHLC from delivery_daily if present, else
  # an intraday proxy). Zero broker calls.
  # To run manually: docker-compose --profile gap-scan up gap-scan
  gap-scan:
    build:
      context: .
      dockerfile: Dockerfile.scanner
    container_name: gap-scanner
    restart: unless-stopped
    env_file: .env
    environment:
      TZ: Asia/Kolkata
      APP_TIMEZONE: Asia/Kolkata
    volumes:
      - shared-data:/app/data
      - ./logs:/app/logs
    depends_on:
      - iv-collector
    command: python gap_scanner_runner.py

  # Delivery-% Surge scanner — conviction-backed moves from bhav delivery data.
  # Reads delivery_daily (iv_history.db) only. Zero broker calls. Evening signal.
  # To run manually: docker-compose --profile delivery-surge up delivery-surge
  delivery-surge:
    build:
      context: .
      dockerfile: Dockerfile.scanner
    container_name: delivery-surge-scanner
    restart: unless-stopped
    env_file: .env
    environment:
      TZ: Asia/Kolkata
      APP_TIMEZONE: Asia/Kolkata
    volumes:
      - shared-data:/app/data
      - ./logs:/app/logs
    depends_on:
      - iv-collector
    command: python delivery_surge_runner.py

  # Smart-Money scanner — net bulk/block institutional flow -> CE/PE BTST bias.
  # Reads the deals table (iv_history.db) only. Zero broker calls. Evening signal.
  # To run manually: docker-compose --profile smart-money up smart-money
  smart-money:
    build:
      context: .
      dockerfile: Dockerfile.scanner
    container_name: smart-money-scanner
    restart: unless-stopped
    env_file: .env
    environment:
      TZ: Asia/Kolkata
      APP_TIMEZONE: Asia/Kolkata
    volumes:
      - shared-data:/app/data
      - ./logs:/app/logs
    depends_on:
      - iv-collector
    command: python smart_money_runner.py

  # Composite Conviction scanner — FUSES all five scanners above into one
  # ranked, direction-aware conviction score per stock. Reads only the persisted
  # *_history tables (zero broker calls). EOD-primary (runs ~20:15, after deals +
  # delivery land). To run manually: docker-compose --profile composite up composite
  composite:
    build:
      context: .
      dockerfile: Dockerfile.scanner
    container_name: composite-scanner
    restart: unless-stopped
    env_file: .env
    environment:
      TZ: Asia/Kolkata
      APP_TIMEZONE: Asia/Kolkata
    volumes:
      - shared-data:/app/data
      - ./logs:/app/logs
    depends_on:
      - iv-collector
    command: python composite_runner.py
