services:
  scanner-dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: discount-scanner-dev
    env_file:
      - .env
    environment:
      TZ: Asia/Kolkata
      APP_TIMEZONE: Asia/Kolkata
    volumes:
      - .:/app
      - ./data:/app/data
      - ./logs:/app/logs
      - ./data/tokens:/app/data/tokens
    command: python main.py --auto-once
