services:
  scanner:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: discount-scanner
    env_file:
      - .env
    environment:
      TZ: Asia/Kolkata
      APP_TIMEZONE: Asia/Kolkata
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    command: python main.py
