services:

  # ── Service 1: IV Collector ────────────────────────────────────────────────
  # Must start first. Feeds IV data to both strategy services.
  iv-collector:
    build:
      context: .
      dockerfile: Dockerfile.iv-collector
    container_name: iv-collector
    restart: unless-stopped
    env_file: .env
    environment:
      TZ: Asia/Kolkata
      APP_TIMEZONE: Asia/Kolkata
    volumes:
      - .:/app
      - ./data:/app/data
      - ./logs:/app/logs
    command: python -m collectors.iv_collector_service

  # ── Service 2: Momentum Strategy (DISCONTINUED) ──────────────────────────
  # Excluded from default `docker-compose up` via profile.
  # To run manually: docker-compose --profile momentum up momentum
  momentum:
    profiles: [momentum]
    build:
      context: .
      dockerfile: Dockerfile.momentum
    container_name: momentum-strategy
    restart: unless-stopped
    env_file: .env
    environment:
      TZ: Asia/Kolkata
      APP_TIMEZONE: Asia/Kolkata
    volumes:
      - .:/app
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      - iv-collector
    command: python momentum_runner.py

  # ── Service 3: Discount/Premium Strategy ──────────────────────────────────
  # Reads IV history from the shared ./data volume (written by iv-collector).
  # Runs the discount scanner only — it does NOT collect IV itself.
  discount:
    build:
      context: .
      dockerfile: Dockerfile.discount
    container_name: discount-strategy
    restart: unless-stopped
    env_file: .env
    environment:
      TZ: Asia/Kolkata
      APP_TIMEZONE: Asia/Kolkata
    volumes:
      - .:/app
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      - iv-collector
    command: python main.py

  # ── Service 4: Break and Bounce Strategy ──────────────────────────────────
  # Step 1: Mark yesterday's daily candle high/low as key levels.
  # Step 2: Wait for 15-min close above/below the level (9:15–11:45 window).
  # Step 3: After breakout, enter on Hammer/Engulfing at the retest on 5-min.
  break-bounce:
    build:
      context: .
      dockerfile: Dockerfile.break-bounce
    container_name: break-bounce-strategy
    restart: unless-stopped
    env_file: .env
    environment:
      TZ: Asia/Kolkata
      APP_TIMEZONE: Asia/Kolkata
    volumes:
      - .:/app
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      - iv-collector
    command: python break_bounce_runner.py

  # ── Service 5: Directional IV Strategy (DISCONTINUED) ───────────────────
  # Excluded from default `docker-compose up` via profile.
  # To run manually: docker-compose --profile directional-iv up directional-iv
  directional-iv:
    profiles: [directional-iv]
    build:
      context: .
      dockerfile: Dockerfile.directional
    container_name: directional-iv-strategy
    restart: unless-stopped
    env_file: .env
    environment:
      TZ: Asia/Kolkata
      APP_TIMEZONE: Asia/Kolkata
    volumes:
      - .:/app
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      - iv-collector
    command: python directional_iv_runner.py

  # ── Option-buyer scanners (alert-only, zero broker/NSE calls) ─────────────
  # No `profiles:` -> these start automatically with the normal daily command:
  #   docker-compose -f docker-compose.prod.yml up -d
  # All read the shared ./data/iv_history.db written by iv-collector. To turn
  # one OFF, add `profiles: [<name>]` back to that service.

  # IV Rank — cheap-IV "buy zone" screener.
  iv-rank:
    build:
      context: .
      dockerfile: Dockerfile.iv-rank
    container_name: iv-rank-scanner
    restart: unless-stopped
    env_file: .env
    environment:
      TZ: Asia/Kolkata
      APP_TIMEZONE: Asia/Kolkata
    volumes:
      - .:/app
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      - iv-collector
    command: python iv_rank_runner.py

  # OI Buildup — Long/Short buildup, covering, unwinding across F&O.
  oi-buildup:
    build:
      context: .
      dockerfile: Dockerfile.scanner
    container_name: oi-buildup-scanner
    restart: unless-stopped
    env_file: .env
    environment:
      TZ: Asia/Kolkata
      APP_TIMEZONE: Asia/Kolkata
    volumes:
      - .:/app
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      - iv-collector
    command: python oi_buildup_runner.py

  # Extreme Opening — gap% + open beyond prior high/low.
  gap-scan:
    build:
      context: .
      dockerfile: Dockerfile.scanner
    container_name: gap-scanner
    restart: unless-stopped
    env_file: .env
    environment:
      TZ: Asia/Kolkata
      APP_TIMEZONE: Asia/Kolkata
    volumes:
      - .:/app
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      - iv-collector
    command: python gap_scanner_runner.py

  # Delivery-% Surge — conviction-backed moves from bhav delivery data.
  delivery-surge:
    build:
      context: .
      dockerfile: Dockerfile.scanner
    container_name: delivery-surge-scanner
    restart: unless-stopped
    env_file: .env
    environment:
      TZ: Asia/Kolkata
      APP_TIMEZONE: Asia/Kolkata
    volumes:
      - .:/app
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      - iv-collector
    command: python delivery_surge_runner.py

  # Smart-Money — net bulk/block institutional flow -> CE/PE BTST bias.
  smart-money:
    build:
      context: .
      dockerfile: Dockerfile.scanner
    container_name: smart-money-scanner
    restart: unless-stopped
    env_file: .env
    environment:
      TZ: Asia/Kolkata
      APP_TIMEZONE: Asia/Kolkata
    volumes:
      - .:/app
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      - iv-collector
    command: python smart_money_runner.py

  # Sonar-Laplace — Ehlers SuperSmoother trend/reversal/breakout signals.
  # Reads 5-min candles via DataProvider (broker fetch per name). Intraday.
  sonar:
    build:
      context: .
      # Full image: sonar reads candles via DataProvider -> DiscountedPremiumScanner
      # -> upstox_adapter, so it needs the broker SDK + scipy (not in the lean
      # scanner image). See discount.py / upstox_adapter.py imports.
      dockerfile: Dockerfile
    container_name: sonar-scanner
    restart: unless-stopped
    env_file: .env
    environment:
      TZ: Asia/Kolkata
      APP_TIMEZONE: Asia/Kolkata
    volumes:
      - .:/app
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      - iv-collector
    command: python sonar_laplace_runner.py

  # Composite — morning confluence + multi-scanner signal aggregator.
  # Fuses gap, OI buildup, IV rank into A+ morning option-buy picks.
  composite:
    build:
      context: .
      dockerfile: Dockerfile.scanner
    container_name: composite-scanner
    restart: unless-stopped
    env_file: .env
    environment:
      TZ: Asia/Kolkata
      APP_TIMEZONE: Asia/Kolkata
    volumes:
      - .:/app
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      - iv-collector
    command: python composite_runner.py

  # ── Dashboard ─────────────────────────────────────────────────────────────
  # Web dashboard — IV graph, paper trade P&L, universe overview.
  # Access via Tailscale: http://<nas-ip>:8050
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: trading-dashboard
    restart: unless-stopped
    ports:
      - "8050:8050"
    volumes:
      - ./data:/app/data
    env_file:
      - .env

  # ── Watchdog + Discord bot ────────────────────────────────────────────────
  # Tails all container logs, alerts on errors, Claude-powered @bot commands.
  # Requires: DISCORD_BOT_TOKEN, DISCORD_CHANNEL_ID, ANTHROPIC_API_KEY in .env
  watchdog-bot:
    build:
      context: .
      dockerfile: Dockerfile.watchdog
    container_name: watchdog-bot
    restart: unless-stopped
    volumes:
      - ./data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - .env

